name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). The tag must already exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Stage release files (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage="the-sieve-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/the-sieve" "$stage/"
          cp LICENSE README.md STYLE_GUIDE.md "$stage/"
          tar -czf "$stage.tar.gz" "$stage"
          shasum -a 256 "$stage.tar.gz" > "$stage.tar.gz.sha256"
          echo "ASSET=$stage.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_SHA=$stage.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Stage release files (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "the-sieve-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/the-sieve.exe" "$stage/"
          Copy-Item LICENSE,README.md,STYLE_GUIDE.md "$stage/"
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash.ToLower() + "  $stage.zip" | Out-File -Encoding ascii "$stage.zip.sha256"
          "ASSET=$stage.zip" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "ASSET_SHA=$stage.zip.sha256" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}
          fail_on_unmatched_files: true
          generate_release_notes: true
