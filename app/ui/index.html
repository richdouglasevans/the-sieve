<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Sieve</title>
<style>
  :root {
    color-scheme: light dark;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    margin: 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  button {
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #888;
    border-radius: 4px;
    background: #f5f5f5;
    color: #222;
  }
  button:hover { background: #eaeaea; }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .status {
    font-size: 13px;
    padding: 8px 12px;
    background: #f5f5f5;
    color: #444;
    border-radius: 4px;
    margin-bottom: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    word-break: break-all;
  }
  .status.idle { color: #666; }
  .status.watching { color: #060; }

  @media (prefers-color-scheme: dark) {
    button {
      background: #2d2d2d;
      color: #eaeaea;
      border-color: #555;
    }
    button:hover { background: #3a3a3a; }
    .status {
      background: #2d2d2d;
      color: #ccc;
    }
    .status.idle { color: #999; }
    .status.watching { color: #6a9955; }
  }
  .log {
    flex: 1;
    background: #1e1e1e;
    color: #d4d4d4;
    border-radius: 4px;
    padding: 12px;
    overflow-y: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .log:empty::before {
    content: "Pick a markdown file to start watching.";
    color: #777;
    font-style: italic;
  }
  .log-entry { display: flex; gap: 8px; }
  .log-time { color: #888; flex-shrink: 0; }
  .log-msg { flex: 1; word-break: break-word; }
  .log-info  .log-msg { color: #9cdcfe; }
  .log-ok    .log-msg { color: #6a9955; }
  .log-error .log-msg { color: #f48771; }
</style>
</head>
<body>
<header>
  <h1>The Sieve</h1>
  <button id="pick">Pick file…</button>
  <button id="stop" disabled>Stop</button>
</header>
<div class="status idle" id="status">No file selected.</div>
<div class="log" id="log"></div>

<script>
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;

  const pickBtn = document.getElementById('pick');
  const stopBtn = document.getElementById('stop');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');

  function setStatus(text, watching) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + (watching ? 'watching' : 'idle');
    stopBtn.disabled = !watching;
  }

  listen('log', (event) => {
    const { timestamp, level, message } = event.payload;
    const row = document.createElement('div');
    row.className = `log-entry log-${level}`;
    const t = document.createElement('span');
    t.className = 'log-time';
    t.textContent = timestamp;
    const m = document.createElement('span');
    m.className = 'log-msg';
    m.textContent = message;
    row.appendChild(t);
    row.appendChild(m);
    logEl.appendChild(row);
    logEl.scrollTop = logEl.scrollHeight;
  });

  pickBtn.addEventListener('click', async () => {
    pickBtn.disabled = true;
    try {
      const path = await invoke('pick_file');
      if (path) {
        await invoke('start_watching', { path });
        setStatus(`Watching: ${path}`, true);
      }
    } catch (err) {
      console.error(err);
      setStatus(`Error: ${err}`, false);
    } finally {
      pickBtn.disabled = false;
    }
  });

  stopBtn.addEventListener('click', async () => {
    try {
      await invoke('stop_watching');
      setStatus('No file selected.', false);
    } catch (err) {
      console.error(err);
    }
  });
</script>
</body>
</html>
